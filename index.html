<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Pro Calc</title>
    <link rel="stylesheet" href="style.css" alt="">
    <script src="calc.js" alt=""></script>
   
</head>
<body>

<div class="app-container">
    <div class="header">
      <img src="Emoji1.png" alt="">
    <h2> Construction Calc.</h2>
    </div>

    <div class="content">
        <div class="section-title">Concrete Slab (Room)</div>
        <div class="input-row">
            <div class="input-group"><label>Length (m)</label><input type="number" id="L" placeholder="5.0"></div>
            <div class="input-group"><label>Width (m)</label><input type="number" id="W" placeholder="4.0"></div>
            <div class="input-group"><label>Depth (m)</label><input type="number" id="D" value="0.15"></div>
        </div>

        <div class="input-group">
            <label>Mix Ratio (Cement : Sand : Gravel)</label>
            <select id="ratio">
                <option value="7">1:2:4 (M15 - Standard Slab)</option>
                <option value="5.5">1:1.5:3 (M20 - Strong Slab/Column)</option>
                <option value="10">1:3:6 (M10 - Foundation/Lean)</option>
            </select>
        </div>

        <div class="section-title">Wall & Blocks</div>
        <div class="input-row">
            <div class="input-group"><label>Wall Height (m)</label><input type="number" id="wH" placeholder="3.0"></div>
            <div class="input-group"><label>Wall Perimeter (m)</label><input type="number" id="wP" placeholder="18.0"></div>
        </div>

        <button onclick="calculate()">Calculate Now</button>

        <div id="resBox" class="results-box">
            <div class="res-line"><span>Total Concrete Volume:</span> <span class="res-val" id="outVol">0</span> m³</div>
            <div class="res-line"><span>Cement (50kg bags):</span> <span class="res-val" id="outCem">0</span> bags</div>
            <div class="res-line"><span>Sand:</span> <span class="res-val" id="outSand">0</span> m³</div>
            <div class="res-line"><span>Gravel:</span> <span class="res-val" id="outGrav">0</span> m³</div>
            <div class="res-line"><span>Blocks Needed:</span> <span class="res-val" id="outBlocks">0</span> pcs</div>
        </div>
    </div>
</div>

<script>

</body>
</html>
